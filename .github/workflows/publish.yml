name: Build & Publish
on: [workflow_dispatch]

# Please note we will gradually be migrating to a more restrictive default publishing mechanism
# leaving comment for gradual retiring of this workflow.
permissions:
  contents: read
  security-events: none

jobs:
  JobBuild:
    name: release
    runs-on: ubuntu-latest
    # Expose step outputs as job outputs
    outputs:
      currentversion: ${{ steps.package_version.outputs.current-version }}
      changelog_reader_changes: ${{ steps.changelog_reader.outputs.changes }}
    permissions:
      actions: read
      contents: read
      deployments: read
      packages: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      # Run install dependencies
      - name: Install dependencies
        run: npm ci
      # Ensure project builds successfully before creating release
      - name: Build
        run: npm run compile
      - name: Get current package version
        id: package_version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - name: Check version is mentioned in Changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@1faaf50aa09d5793d9a100819973df801febfb31 # v2.4.0
        with:
          validation_depth: 10
          version: ${{ steps.package_version.outputs.current-version }}
          path: "CHANGELOG.md"
  JobsPublish:
    name: publish
    runs-on: ubuntu-latest
    needs: JobBuild
    environment: vscode-marketplace
    permissions:
      actions: read
      contents: write
      deployments: read
      packages: none
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true
      # Checkout the code again for release
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
      # Run install dependencies
      - name: Install dependencies
        run: npm ci

      # ------------------------
      # Package VSIX (without publishing)
      # ------------------------
      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Get VSIX filename
        id: vsix
        run: |
          VSIX_FILE="dalec-vscode-tools-${{ needs.JobBuild.outputs.currentversion }}.vsix"
          if [ ! -f "${VSIX_FILE}" ]; then
            echo "::error::Expected ${VSIX_FILE} not found"
            exit 1
          fi
          VSIX_PATH=$(realpath "${VSIX_FILE}")
          echo "VSIX_FILE=${VSIX_FILE}" >> $GITHUB_OUTPUT
          echo "VSIX_PATH=${VSIX_PATH}" >> $GITHUB_OUTPUT
          echo "::notice::VSIX path: ${VSIX_PATH}"

      # ------------------------
      # Install Cosign
      # ------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # ------------------------
      # Sign VSIX (OIDC Keyless)
      # ------------------------
      - name: Sign VSIX
        env:
          VSIX_FILE: ${{ steps.vsix.outputs.VSIX_FILE }}
        run: |
          cosign sign-blob \
            --yes \
            --use-signing-config \
            --bundle "${VSIX_FILE}.bundle" \
            "${VSIX_FILE}"

      # ------------------------
      # Verify Signature Before Release
      # ------------------------
      - name: Verify VSIX signature
        env:
          VSIX_FILE: ${{ steps.vsix.outputs.VSIX_FILE }}
        run: |
          cosign verify-blob \
            --bundle "${VSIX_FILE}.bundle" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${VSIX_FILE}"

      # ------------------------
      # Generate Artifact Attestation
      # ------------------------
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.vsix.outputs.VSIX_PATH }}

      # ------------------------
      # Publish to Marketplace (after signing & verification)
      # ------------------------
      # - name: Publish to VS Code Marketplace
      #   env:
      #     VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
      #     VSIX_FILE: ${{ steps.vsix.outputs.VSIX_FILE }}
      #   run: |
      #     npx @vscode/vsce publish \
      #       --pat "$VS_MARKETPLACE_TOKEN" \
      #       --packagePath "$VSIX_FILE"

      # ------------------------
      # Create GitHub Release (Version Tag)
      # Only after successful marketplace publish to avoid orphaned releases
      # ------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ needs.JobBuild.outputs.currentversion }}
          name: v${{ needs.JobBuild.outputs.currentversion }}
          body: ${{ needs.JobBuild.outputs.changelog_reader_changes }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ${{ steps.vsix.outputs.VSIX_FILE }}
            ${{ steps.vsix.outputs.VSIX_FILE }}.bundle

