name: Build & Publish
on: [workflow_dispatch]

# Please note we will gradually be migrating to a more restrictive default publishing mechanism
# leaving comment for gradual retiring of this workflow.
permissions:
  contents: read
  security-events: none

jobs:
  JobBuild:
    name: release
    runs-on: ubuntu-latest
    # Expose step outputs as job outputs
    outputs:
      currentversion: ${{ steps.package_version.outputs.current-version }}
      changelog_reader_changes: ${{ steps.changelog_reader.outputs.changes }}
    permissions:
      actions: read
      contents: read
      deployments: read
      packages: none
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
      # Run install dependencies
      - name: Install dependencies
        run: npm ci
      # Ensure project builds successfully before creating release
      - name: Build
        run: npm run compile
      - name: Get current package version
        id: package_version
        uses: martinbeentjes/npm-get-version-action@3cf273023a0dda27efcd3164bdfb51908dd46a5b # v1.3.1
      - name: Check version is mentioned in Changelog
        id: changelog_reader
        uses: mindsers/changelog-reader-action@32aa5b4c155d76c94e4ec883a223c947b2f02656 # v2.2.3
        with:
          validation_depth: 10
          version: ${{ steps.package_version.outputs.current-version }}
          path: "CHANGELOG.md"
  JobsPublish:
    name: publish
    runs-on: ubuntu-latest
    needs: JobBuild
    environment: vscode-marketplace
    permissions:
      actions: read
      contents: write
      deployments: read
      packages: none
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b # v2.15.0
        with:
          egress-policy: audit
          disable-sudo: true
          disable-telemetry: true
      # Checkout the code again for release
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Use Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20
      # Run install dependencies
      - name: Install dependencies
        run: npm ci

      # ------------------------
      # Package VSIX (without publishing)
      # ------------------------
      - name: Package VSIX
        run: npx vsce package

      - name: Get VSIX filename
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "VSIX_FILE=${VSIX_FILE}" >> $GITHUB_OUTPUT
          echo "VSIX_PATH=$(realpath ${VSIX_FILE})" >> $GITHUB_OUTPUT

      # ------------------------
      # Install Cosign
      # ------------------------
      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      # ------------------------
      # Sign VSIX (OIDC Keyless)
      # ------------------------
      - name: Sign VSIX
        run: |
          cosign sign-blob \
            --yes \
            --bundle ${{ steps.vsix.outputs.VSIX_FILE }}.bundle \
            ${{ steps.vsix.outputs.VSIX_FILE }}

      # ------------------------
      # Verify Signature Before Release
      # ------------------------
      - name: Verify VSIX signature
        run: |
          cosign verify-blob \
            --bundle ${{ steps.vsix.outputs.VSIX_FILE }}.bundle \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            ${{ steps.vsix.outputs.VSIX_FILE }}

      # ------------------------
      # Generate Artifact Attestation
      # ------------------------
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.vsix.outputs.VSIX_PATH }}

      # ------------------------
      # Create GitHub Release (Version Tag)
      # ------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ needs.JobBuild.outputs.currentversion }}
          name: v${{ needs.JobBuild.outputs.currentversion }}
          body: ${{ needs.JobBuild.outputs.changelog_reader_changes }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------
      # Upload Signed Artifact to Release
      # ------------------------
      - name: Upload VSIX to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            v${{ needs.JobBuild.outputs.currentversion }} \
            ${{ steps.vsix.outputs.VSIX_FILE }} \
            ${{ steps.vsix.outputs.VSIX_FILE }}.bundle

      # ------------------------
      # Publish to Marketplace (after signing & verification)
      # ------------------------
      - name: Publish to VS Code Marketplace
        uses: HaaLeo/publish-vscode-extension@ca5561daa085dee804bf9f37fe0165785a9b14db # v2.0.0
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ steps.vsix.outputs.VSIX_FILE }}

